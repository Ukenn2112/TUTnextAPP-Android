name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - 'app/build.gradle.kts'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version_name: ${{ steps.check.outputs.version_name }}
      version_code: ${{ steps.check.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          OLD_VERSION=$(git diff HEAD~1 HEAD -- app/build.gradle.kts | grep -A0 '^\-.*versionName' | sed 's/.*"\(.*\)".*/\1/' || echo "")
          NEW_VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/[^0-9]//g')

          echo "version_name=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

          if [ -n "$OLD_VERSION" ] && [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version not changed (current: $NEW_VERSION)"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode or generate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          STORE_PASS="${KEYSTORE_PASSWORD:-tutnext123}"
          KEY_PASS="${KEY_PASSWORD:-$STORE_PASS}"
          ALIAS="${KEY_ALIAS:-tutnext}"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release-keystore-raw.jks
            # Convert to legacy PKCS12 format to fix "Tag number over 30 is not supported"
            # which occurs when the keystore was created with Java 9+ using modern algorithms
            keytool -importkeystore \
              -srckeystore release-keystore-raw.jks \
              -destkeystore release-keystore.jks \
              -deststoretype PKCS12 \
              -srcstorepass "$STORE_PASS" \
              -deststorepass "$STORE_PASS" \
              -noprompt \
              -J-Dkeystore.pkcs12.legacy 2>/dev/null \
              || { echo "Warning: Legacy conversion failed, using raw keystore"; cp release-keystore-raw.jks release-keystore.jks; }
          else
            # No keystore secret provided; generate a self-signed JKS keystore
            # using the default credentials defined in app/build.gradle.kts
            keytool -genkey -v \
              -keystore release-keystore.jks \
              -alias "$ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=TUTnext, OU=Dev, O=TUTnext, L=Tokyo, S=Tokyo, C=JP" \
              -storetype JKS
          fi

      - name: Build Release APK & AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Rename artifacts
        run: |
          VERSION=${{ needs.check-version.outputs.version_name }}
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/TUTnext-v${VERSION}.apk
          cp app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/TUTnext-v${VERSION}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version_name }}
          name: TUTnext v${{ needs.check-version.outputs.version_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/TUTnext-v${{ needs.check-version.outputs.version_name }}.apk
            app/build/outputs/bundle/release/TUTnext-v${{ needs.check-version.outputs.version_name }}.aab
